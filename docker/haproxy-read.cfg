global
  log stdout format raw local0
  maxconn 256

defaults
  log global
  mode http
  timeout connect 5s
  timeout client 120s
  timeout server 120s

frontend read_front
  bind *:8882
  default_backend read_back

backend read_back
  option httpchk GET /v1/health
  http-check expect status 200
  server sideweed_read sideweed-read:8883 check inter 3s fall 2 rise 2
