# Loop-mounted ext4 at /vol for recovery-disk (remount ro keeps blobs in /meta/disk.img).
# Usage: docker compose -f docker-compose.yml -f docker-compose.recovery-disk.yml up -d
services:
  master:
    command: >
      master -ip=master -ip.bind=0.0.0.0
      -defaultReplication=001 -volumeSizeLimitMB=8
      -volumePreallocate=false
  volume1:
    cap_add:
      - SYS_ADMIN
    privileged: true
    entrypoint: ["/recovery-disk-entrypoint.sh"]
    command: >
      volume -ip=volume1 -mserver=master:9333 -ip.bind=0.0.0.0
      -port=8080 -dir=/vol -max=3 -dataCenter=dc1 -rack=rack1
      -metricsPort=9324 -metricsIp=0.0.0.0
    volumes:
      - volume1_recovery:/meta

volumes:
  volume1_recovery:
