services:
  master:
    image: chrislusf/seaweedfs:3.80
    command: >
      master -ip=master -ip.bind=0.0.0.0
      -defaultReplication=001 -volumeSizeLimitMB=256
    ports:
      - "9333:9333"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  volume1:
    image: chrislusf/seaweedfs:3.80
    command: >
      volume -ip=volume1 -mserver=master:9333 -ip.bind=0.0.0.0
      -port=8080 -dir=/data -max=5 -dataCenter=dc1
    ports:
      - "8080:8080"
    volumes:
      - volume1_data:/data
    depends_on:
      master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  volume2:
    image: chrislusf/seaweedfs:3.80
    command: >
      volume -ip=volume2 -mserver=master:9333 -ip.bind=0.0.0.0
      -port=8080 -dir=/data -max=5 -dataCenter=dc2
    ports:
      - "8081:8080"
    volumes:
      - volume2_data:/data
    depends_on:
      master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  sideweed:
    build:
      context: ./sideweed
      dockerfile: ../docker/sideweed.Dockerfile
    command: >
      -l --json --health-path=/healthz --health-duration=3s
      --address=:8880 http://volume1:8080 http://volume2:8080
    ports:
      - "8880:8880"
    depends_on:
      volume1:
        condition: service_healthy
      volume2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8880/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: video-archive-stand
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  cql-init:
    image: cassandra:4.1
    volumes:
      - ./cassandra/schema.cql:/schema.cql:ro
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: ["cqlsh", "cassandra", "-f", "/schema.cql"]
    restart: "no"

volumes:
  volume1_data:
  volume2_data:
  cassandra_data:
