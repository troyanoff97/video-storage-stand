# Optional override for chaos testing with privileged volume access.
# Usage: docker compose -f docker-compose.yml -f docker-compose.chaos.yml up -d
#
# volume1 uses small tmpfs so disk_full / remount,ro reliably block writes.
services:
  master:
    command: >
      master -ip=master -ip.bind=0.0.0.0
      -defaultReplication=000 -volumeSizeLimitMB=8
      -volumePreallocate=false
  volume1:
    command: >
      volume -ip=volume1 -mserver=master:9333 -ip.bind=0.0.0.0
      -port=8080 -dir=/data -max=20 -dataCenter=dc1 -rack=rack1
      -metricsPort=9324 -metricsIp=0.0.0.0
    cap_add:
      - SYS_ADMIN
    privileged: true
    volumes: !reset []
    tmpfs:
      - /data:size=64m,mode=1777
    ports:
      - "8080:8080"
      - "9324:9324"
  volume2:
    command: >
      volume -ip=volume2 -mserver=master:9333 -ip.bind=0.0.0.0
      -port=8080 -dir=/data -max=20 -dataCenter=dc1 -rack=rack1
      -metricsPort=9324 -metricsIp=0.0.0.0
    cap_add:
      - SYS_ADMIN
    ports:
      - "8081:8080"
      - "9325:9324"
