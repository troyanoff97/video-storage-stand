# Optional override for chaos testing with privileged volume access.
# Usage: docker compose -f docker-compose.yml -f docker-compose.chaos.yml up -d
#
# volume1 uses tmpfs for /data so disk_readonly can remount,ro (named volumes
# on the host root filesystem cannot be remounted read-only in-container).
services:
  volume1:
    cap_add:
      - SYS_ADMIN
    privileged: true
    volumes: !reset []
    tmpfs:
      - /data:size=512m,mode=1777
  volume2:
    cap_add:
      - SYS_ADMIN
