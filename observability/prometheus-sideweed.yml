# Sample Prometheus config for sideweed write metrics (reference only).
# NOT wired into docker-compose.yml — copy or merge into your monitoring stack.
#
# Validate:
#   promtool check config observability/prometheus-sideweed.yml
#
# Run (example):
#   prometheus --config.file=observability/prometheus-sideweed.yml
#
# Targets:
#   - sideweed:8880  — when Prometheus runs in the same Docker network as the stand
#   - localhost:8880 — when Prometheus runs on the host (port mapped by compose)

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - sideweed-alert-rules.yml

scrape_configs:
  - job_name: sideweed
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ['sideweed:8880']
        labels:
          role: write
      # Uncomment for host-run Prometheus against mapped compose port:
      # - targets: ['localhost:8880']
      #   labels:
      #     role: write
